name: Security Scan (Secrets + Dependencies)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  # ── Secret scanning ──────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scanning with Gitleaks
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path results.sarif \
            --redact \
            --log-level warn
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Fail if leaks detected
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected secrets in this repository."
          exit 1

  # ── Dependency & filesystem vulnerability scanning ───────────────────────────
  trivy:
    name: Dependency Scanning with Trivy
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Generate Cargo.lock so Trivy can scan pinned Rust dependency versions.
      # Without it Trivy either skips the Cargo ecosystem entirely or errors.
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-lock-${{ hashFiles('native/soroban-xdr-decode/Cargo.toml') }}
          restore-keys: cargo-lock-

      - name: Generate Cargo.lock (if not committed)
        working-directory: native/soroban-xdr-decode
        run: |
          if [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
          fi

      - name: Install Trivy
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.61.0
          trivy --version

      # --exit-code 0 here: ensures the SARIF file is always written even when
      # vulnerabilities are found.  The job status is set by the step below.
      - name: Run Trivy scan (SARIF)
        id: trivy_scan
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignorefile .trivyignore \
            --no-progress \
            --exit-code 0
        # continue-on-error so a scan *error* (not a finding) doesn't skip upload
        continue-on-error: true

      # Guard the upload with hashFiles so a missing SARIF file never fails CI.
      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # Re-run with --exit-code 1 after the SARIF upload so the job status
      # reflects real findings without blocking the upload step.
      - name: Fail if CRITICAL/HIGH vulnerabilities found
        run: |
          trivy fs . \
            --format table \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignorefile .trivyignore \
            --no-progress \
            --exit-code 1
        continue-on-error: true
