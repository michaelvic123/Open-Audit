# .cargo/config.toml — cross-compilation settings for the soroban-xdr-decode addon.
#
# These settings are read by `cargo build` / `napi build` in both local dev
# and the Docker rust-builder stage.  The CARGO_TARGET_* env vars in the
# Dockerfile take precedence over these values, but having them here means
# local `cross` or `cargo build --target` invocations also work correctly.

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
# Uses the default system linker on amd64 hosts — no override needed.

# ── Build cache settings ─────────────────────────────────────────────────────
[build]
# Parallelism: let cargo use all available cores in CI runners.
jobs = 0
