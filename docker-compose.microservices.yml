version: '3.8'

services:
  # ============================================================================
  # Redis - Message Broker for Pub/Sub
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: open-audit-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - open-audit-network
    restart: unless-stopped

  # ============================================================================
  # Stellar Indexer Worker - Isolated Blockchain Polling Process
  # ============================================================================
  indexer-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: open-audit-indexer
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - REDIS_CHANNEL=stellar:events
      - WORKER_ID=indexer-worker-1
      - INDEXER_MODE=stream
      - INDEXER_WORKER_COUNT=4
      - INDEXER_MAX_QUEUE_SIZE=1000
      - NEXT_PUBLIC_NETWORK=${NEXT_PUBLIC_NETWORK:-testnet}
      - NEXT_PUBLIC_HORIZON_URL=${NEXT_PUBLIC_HORIZON_URL}
      - NEXT_PUBLIC_SOROBAN_RPC_URL=${NEXT_PUBLIC_SOROBAN_RPC_URL}
      - NEXT_PUBLIC_NETWORK_PASSPHRASE=${NEXT_PUBLIC_NETWORK_PASSPHRASE}
      - HEALTH_CHECK_INTERVAL_MS=30000
      - ENABLE_RESILIENCE=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - open-audit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # EVM Bridge Indexer Worker - Listens to Ethereum/L2 bridge Mint events
  # ============================================================================
  evm-bridge-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: open-audit-evm-bridge
    command: ["node", "-r", "ts-node/register", "--project", "tsconfig.server.json", "src/worker/evm-bridge-indexer.ts"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - REDIS_BRIDGE_CHANNEL=bridge:events
      - EVM_WORKER_ID=evm-bridge-worker-1
      - EVM_RPC_ENDPOINTS=${EVM_RPC_ENDPOINTS:-}
      - BRIDGE_CONTRACT_ADDRESSES=${BRIDGE_CONTRACT_ADDRESSES:-}
      - STELLAR_BRIDGE_CONTRACT_IDS=${STELLAR_BRIDGE_CONTRACT_IDS:-}
      - EVM_POLL_INTERVAL_MS=12000
      - EVM_MAX_BLOCK_RANGE=500
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - open-audit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Next.js Web Server - HTTP/WebSocket Server with Redis Subscription
  # ============================================================================
  web-server:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: open-audit-web
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - REDIS_CHANNEL=stellar:events
      - MAX_WS_CONNECTIONS_PER_IP=5
      - HEALTH_CHECK_INTERVAL_MS=30000
      - NEXT_PUBLIC_NETWORK=${NEXT_PUBLIC_NETWORK:-testnet}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - open-audit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # PostgreSQL Database (Optional - if using Prisma)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: open-audit-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-openaudit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openaudit}
      - POSTGRES_DB=${POSTGRES_DB:-openaudit}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openaudit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-audit-network
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  open-audit-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
