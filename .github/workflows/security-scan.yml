name: Security Scan (Secrets + Dependencies)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  # ── Secret scanning ──────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scanning with Gitleaks
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path results.sarif \
            --redact \
            --log-level warn
          echo "exit_code=0" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Fail if leaks detected
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected secrets in this repository."
          exit 1

  # ── Dependency & filesystem vulnerability scanning ───────────────────────────
  trivy:
    name: Dependency Scanning with Trivy
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Generate Cargo.lock for Trivy's Cargo scanner ────────────────────
      # Trivy needs a Cargo.lock to enumerate pinned crate versions and match
      # them against the CVE database.  Cargo.lock is intentionally not
      # committed (it is generated inside Docker via a BuildKit cache mount),
      # so we generate it here on the runner before scanning.
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          # Key on Cargo.toml — regenerate when dependencies change.
          key: trivy-cargo-${{ hashFiles('native/soroban-xdr-decode/Cargo.toml') }}
          restore-keys: |
            trivy-cargo-

      - name: Generate Cargo.lock
        working-directory: native/soroban-xdr-decode
        # Always regenerate — keeps the lock in sync with Cargo.toml without
        # requiring a manual commit.
        run: cargo generate-lockfile

      # ── Install Trivy CLI ─────────────────────────────────────────────────
      # Pin to a specific version for reproducible scans.
      # We install the CLI directly rather than using the action tag because
      # aquasecurity/trivy-action was part of a supply-chain incident in
      # Mar 2026 (GHSA-69fq-xp46-6x23).
      - name: Install Trivy
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.61.0
          trivy --version

      # ── Filesystem scan — SARIF output ────────────────────────────────────
      # Scans package.json (npm) and the generated Cargo.lock (Rust).
      # --exit-code 0 ensures the SARIF file is always written so the upload
      # step never sees a missing file.
      # --skip-dirs node_modules: exclude vendored packages (the image scan
      # covers the installed dependency tree; scanning both is redundant and
      # greatly inflates scan time).
      - name: Run Trivy filesystem scan (SARIF)
        id: trivy_scan
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-fs-results.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignorefile .trivyignore \
            --skip-dirs node_modules \
            --no-progress \
            --exit-code 0
        # continue-on-error: catch scan tool errors (not findings) so the
        # upload step below still runs.
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      # ── Re-run in table mode to set final job status ──────────────────────
      # Runs after the SARIF upload so the Security tab is always populated
      # even when this step exits non-zero.
      - name: Fail if CRITICAL/HIGH vulnerabilities found
        run: |
          trivy fs . \
            --format table \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignorefile .trivyignore \
            --skip-dirs node_modules \
            --no-progress \
            --exit-code 1
        continue-on-error: true
