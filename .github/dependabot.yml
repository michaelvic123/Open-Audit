version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"

  # Track Rust crate updates for the native N-API addon.
  - package-ecosystem: "cargo"
    directory: "/native/soroban-xdr-decode"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
      - "rust"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
