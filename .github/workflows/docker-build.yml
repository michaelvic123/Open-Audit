name: Build & Push Multi-Arch Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

# Limit concurrent runs on the same ref to avoid wasted runner minutes.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write          # required to push to GHCR
      security-events: write   # required to upload Trivy SARIF results

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── QEMU — enables cross-compilation on the amd64 runner ─────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Buildx — multi-platform builder ──────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry login (skipped on forks / unauthenticated PRs) ──────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags and labels ──────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # ── Sanitise platform string for use as a cache key ───────────────────────
      - name: Sanitise platform string
        id: sanitise
        run: echo "platform=$( echo '${{ matrix.platform }}' | tr '/' '-' )" >> "$GITHUB_OUTPUT"

      # ── Build (and push on non-PR runs) ───────────────────────────────────────
      # On PR runs we export the image to a local tarball so Trivy can scan it
      # without needing registry access.
      - name: Build and push image (push event)
        id: build_push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.sanitise.outputs.platform }}
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.sanitise.outputs.platform }},mode=max
          provenance: false

      - name: Build image to tarball (pull_request event)
        id: build_pr
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Export to OCI tarball for local Trivy scan — no registry needed.
          outputs: type=docker,dest=/tmp/image.tar
          provenance: false

      # ── Security scan — Trivy CLI ──────────────────────────────────────────────
      # aquasecurity/trivy-action is not used: the action tags are unreliable
      # following a supply-chain incident (Mar 2026, GHSA-69fq-xp46-6x23).
      # We install the Trivy CLI directly and scan the appropriate target:
      #   • push events  → scan the pushed image by digest from GHCR
      #   • PR events    → scan the local tarball (no registry login required)
      - name: Install Trivy
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.61.0
          trivy --version

      - name: Run Trivy image scan (push event)
        if: github.event_name != 'pull_request'
        # --exit-code 0 guarantees the SARIF file is written before this step
        # exits. A later step re-runs trivy to set the correct job status.
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --no-progress \
            --exit-code 0 \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}"

      - name: Run Trivy image scan (pull_request event)
        if: github.event_name == 'pull_request'
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --no-progress \
            --exit-code 0 \
            --input /tmp/image.tar

      # ── Upload SARIF to GitHub Security tab ───────────────────────────────────
      - name: Upload Trivy SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-docker-${{ steps.sanitise.outputs.platform }}

      # ── Fail the job if HIGH/CRITICAL CVEs were found ─────────────────────────
      # Runs after the SARIF upload so the Security tab is always populated.
      - name: Fail on HIGH/CRITICAL vulnerabilities (push event)
        if: github.event_name != 'pull_request'
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --no-progress \
            --exit-code 1 \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}"
        continue-on-error: true

      - name: Fail on HIGH/CRITICAL vulnerabilities (pull_request event)
        if: github.event_name == 'pull_request'
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --no-progress \
            --exit-code 1 \
            --input /tmp/image.tar
        continue-on-error: true

  # ── Merge per-platform digests into a single multi-arch manifest ──────────────
  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push multi-arch manifest
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-linux-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-linux-arm64
          provenance: false
