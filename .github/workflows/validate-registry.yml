name: Validate Translation Registry

on:
  pull_request:
    paths:
      - "lib/translator/registry.json"
      - "lib/translator/registry.schema.json"
  push:
    branches: [main]
    paths:
      - "lib/translator/registry.json"
      - "lib/translator/registry.schema.json"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx ts-node scripts/validate-registry.ts
      - run: npm ci
      - run: node scripts/validate-registry.js
