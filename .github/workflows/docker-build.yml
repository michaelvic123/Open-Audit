name: Build & Push Multi-Arch Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── QEMU — cross-arch kernel emulation ───────────────────────────────
      # Required so the arm64 Docker stage can run arm64 binaries during
      # the build (e.g. the final Next.js SSR checks).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Buildx ────────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Inline cache requires the containerd image store driver.
          driver-opts: image=moby/buildkit:latest

      # ── Registry login (skipped on forks / PRs) ───────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image tags + labels ───────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # Sanitise "linux/amd64" → "linux-amd64" for use as a cache key / filename.
      - name: Sanitise platform string
        id: sanitise
        run: |
          echo "platform=$( echo '${{ matrix.platform }}' | tr '/' '-' )" \
            >> "$GITHUB_OUTPUT"

      # ── Build — push on main/tag, local tarball on PR ─────────────────────
      #
      # NOTE: Cargo.lock is generated inside the Dockerfile via a BuildKit
      # cache mount (--mount=type=cache).  It does NOT need to be committed
      # or generated on the runner first.
      - name: Build and push image (push event)
        id: build_push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # TARGETARCH is automatically set by Buildx from the platform value.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.sanitise.outputs.platform }}
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ steps.sanitise.outputs.platform }},mode=max
          provenance: false

      - name: Build image to tarball (pull_request event)
        id: build_pr
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          # Build for the single platform being tested in this matrix leg.
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Export to a platform-specific filename so the two matrix legs
          # don't overwrite each other's tarballs on the same runner.
          outputs: type=docker,dest=/tmp/image-${{ steps.sanitise.outputs.platform }}.tar
          provenance: false

      # ── Trivy — install CLI directly ──────────────────────────────────────
      # We do NOT use aquasecurity/trivy-action because its tags are pinned
      # to an action SHA that was compromised in the Mar 2026 supply-chain
      # incident (GHSA-69fq-xp46-6x23).  Installing the CLI directly from the
      # official install script is the safe alternative.
      - name: Install Trivy
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.61.0
          trivy --version

      # ── Scan image for HIGH/CRITICAL CVEs ────────────────────────────────
      # exit-code 0 on the SARIF run so the file is always written.
      - name: Run Trivy image scan — SARIF (push event)
        if: github.event_name != 'pull_request'
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --no-progress \
            --exit-code 0 \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}"

      - name: Run Trivy image scan — SARIF (pull_request event)
        if: github.event_name == 'pull_request'
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --no-progress \
            --exit-code 0 \
            --input /tmp/image-${{ steps.sanitise.outputs.platform }}.tar

      # Upload SARIF only when the file was actually written.
      - name: Upload Trivy SARIF report
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-docker-${{ steps.sanitise.outputs.platform }}

      # Re-run in table mode with exit-code 1 to set the job status.
      # Runs after the SARIF upload so the Security tab is always populated.
      # continue-on-error keeps the job "yellow" rather than hard-failing the PR.
      - name: Fail on HIGH/CRITICAL vulnerabilities (push event)
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --no-progress \
            --exit-code 1 \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_push.outputs.digest }}"

      - name: Fail on HIGH/CRITICAL vulnerabilities (pull_request event)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --no-progress \
            --exit-code 1 \
            --input /tmp/image-${{ steps.sanitise.outputs.platform }}.tar

  # ── Merge per-platform layers into a single multi-arch manifest ───────────
  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push multi-arch manifest
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-linux-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-linux-arm64
          provenance: false
