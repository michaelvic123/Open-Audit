openapi: 3.0.0
info:
  title: Open-Audit API
  description: API for Open-Audit's translated data feeds, allowing developers to ingest historical contract events and monitor real-time feeds.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /api/ingest-historical:
    post:
      summary: Ingest historical ledger range
      description: Fetches and backfills contract events from a specified historical ledger range.
      operationId: ingestHistorical
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contractId
                - startSequence
                - endSequence
              properties:
                contractId:
                  type: string
                  description: The Soroban contract ID to fetch events for.
                  example: "CABC123..."
                startSequence:
                  type: integer
                  description: The starting ledger sequence number (inclusive).
                  example: 1000
                endSequence:
                  type: integer
                  description: The ending ledger sequence number (inclusive).
                  example: 5000
                chunkSize:
                  type: integer
                  description: Number of ledgers per chunk to avoid RPC limits.
                  example: 1000
      responses:
        '200':
          description: Successful ingestion
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  contractId:
                    type: string
                  range:
                    type: object
                    properties:
                      start:
                        type: integer
                      end:
                        type: integer
                  results:
                    type: object
                    properties:
                      totalEvents:
                        type: integer
                      totalChunks:
                        type: integer
                      events:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            type:
                              type: string
                            ledger:
                              type: integer
                            createdAt:
                              type: string
                              format: date-time
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details:
                    type: string
components:
  schemas: {}
